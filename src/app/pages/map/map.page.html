<ion-header class="ion-no-border position-fixed top-0 w-100" style="z-index: 1000;">
  <ion-toolbar class="transparent-toolbar">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()" class="back-circle">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="fw-bold">Set Delivery Location</ion-title>
  </ion-toolbar>

  <div class="search-container ion-padding-horizontal">
    <div class="search-box" (click)="isSearchModalOpen = true">
      <ion-icon name="search-outline" color="dark"></ion-icon>
      <div class="search-text-wrapper">
        <ion-text color="dark" class="main-addr text-truncate">
          {{ (currentAddress) || 'Loading location...' }}
        </ion-text>
        <ion-text color="medium" class="sub-addr text-truncate">
          {{ currentAddress}}
        </ion-text>
      </div>
    </div>
  </div>
</ion-header>

<ion-content [fullscreen]="true" class="ion-no-padding">
  <div #map id="map" style="height: 100%; width: 100%;"></div>

  <div class="location-pin">
    <div class="pin-wrapper">
      <i class="bi bi-geo-alt-fill"></i>
      <div class="pin-shadow"></div>
    </div>
  </div>

  <ion-footer class="location-footer position-fixed bottom-0 w-100">
    <div class="fab-container">
      <div (click)="getCurrentLocation()" class="fab-btn mb-2">
        <ion-icon name="locate-outline"></ion-icon>
      </div>
      <div (click)="backtoServiceArea()" class="fab-btn">
        <ion-icon name="refresh-outline"></ion-icon>
      </div>
    </div>

    <ion-toolbar class="ion-padding-vertical">
      <div class="px-3 pb-2 d-flex align-items-center">
        <ion-icon name="map-outline" class="me-2" color="primary"></ion-icon>
        <ion-text class="fw-medium text-truncate">{{ currentAddress }}</ion-text>
      </div>
      
      <div class="px-3">
        <ion-button expand="block" mode="ios" color="dark" (click)="confirmLocation()" [disabled]="!inside || isPolygonLoading">
          <span *ngIf="!isPolygonLoading">{{ inside ? 'Confirm Location' : 'Location Not Serviceable' }}</span>
          <ion-spinner *ngIf="isPolygonLoading" name="crescent"></ion-spinner>
        </ion-button>
      </div>
    </ion-toolbar>
  </ion-footer>
</ion-content>

<ion-modal [isOpen]="isModalOpen" (didDismiss)="isModalOpen = false" [initialBreakpoint]="0.7" [breakpoints]="[0, 0.7, 0.9]">
  <ng-template>
    <ion-content class="ion-padding">
      <h4 class="fw-bold mb-3">Save Address Details</h4>
      <div class="preview-map-box mb-3">
        <img [src]="mapImgUrl" alt="Static Map" />
      </div>

      <ion-list lines="none">
        <ion-item class="input-item mb-2">
          <ion-input label="House / Flat No." labelPlacement="stacked" [(ngModel)]="houseNo" placeholder="Enter house number"></ion-input>
        </ion-item>
        <ion-item class="input-item mb-2">
          <ion-input label="Apartment / Landmark" labelPlacement="stacked" [(ngModel)]="landmark" placeholder="Nearby landmark"></ion-input>
        </ion-item>
      </ion-list>

      <p class="mt-3 mb-2 fw-medium">Save as</p>
      <div class="chip-row">
        <ion-chip [outline]="selectedLabel !== 'home'" (click)="selectedLabel = 'home'" [color]="selectedLabel === 'home' ? 'dark' : ''">Home</ion-chip>
        <ion-chip [outline]="selectedLabel !== 'work'" (click)="selectedLabel = 'work'" [color]="selectedLabel === 'work' ? 'dark' : ''">Work</ion-chip>
        <ion-chip [outline]="selectedLabel !== 'other'" (click)="selectedLabel = 'other'" [color]="selectedLabel === 'other' ? 'dark' : ''">Other</ion-chip>
      </div>

      <ion-button expand="block" color="dark" class="mt-4 py-2" (click)="confirmLocation()" [disabled]="isLoading">
        {{ isLoading ? 'Saving...' : 'Save & Continue' }}
      </ion-button>
    </ion-content>
  </ng-template>
</ion-modal>
