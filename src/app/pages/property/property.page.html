<ion-header>
  <ion-toolbar>
    <ion-searchbar placeholder="Search for 'Tata Tiago'" [(ngModel)]="searchText"></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- Filters -->
  <div class="filters">
    <ion-chip color="primary">Filters</ion-chip>
    <ion-chip color="primary">Sort by</ion-chip>
    <ion-chip color="primary">Fuel</ion-chip>
    <ion-chip color="primary">Seller</ion-chip>
  </div>

  <!-- Result count -->
  <div class="result-text">
    {{cars.length}} Used CNG cars in Bangalore
  </div>

  <!-- Car Cards -->
  <ion-card *ngFor="let car of cars">

    <img [src]="car.image"/>

    <ion-card-content>

      <div class="car-title">
        {{car.year}} {{car.brand}} {{car.model}}
      </div>

      <div class="car-subtitle">
        {{car.variant}}
      </div>

      <div class="car-details">
        {{car.km}} km | {{car.fuel}} | {{car.transmission}} | {{car.location}}
      </div>

      <div class="price">
        ₹{{car.price}} lakh
      </div>

      <div class="tags">
        <ion-badge color="success">30 days return</ion-badge>
        <ion-badge color="medium">300+ quality checks</ion-badge>
      </div>

      <!-- <div class="buttons">
        <ion-button size="small" fill="outline">Free Test Drive</ion-button>
        <ion-button size="small">View Details</ion-button>
      </div> -->

    </ion-card-content>

  </ion-card>

</ion-content>
